[pytest]
# Pytest configuration for Travion ML Services

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = 
    transport-service/tests
    safety-service/tests
    weather-service/tests
    ai-agent-engine/tests

# Minimum Python version
minversion = 7.0

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -ra

# Coverage options
[coverage:run]
source = .
omit = 
    */tests/*
    */venv/*
    */env/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
