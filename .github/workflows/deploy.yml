  #
  #     - name: Upload Trivy results to GitHub Security
  #       uses: github/codeql-action/upload-sarif@v3
  #       if: always()
  #       with:
  #         sarif_file: "trivy-results.sarif"
  #
  #     - name: Run Trivy in table format
  #       if: always()
  #       uses: aquasecurity/trivy-action@master
  #       with:
  #         image-ref: ${{ needs.build-and-push.outputs.image-tag }}
  #         format: "table"
  #         severity: "CRITICAL,HIGH"
  #         scanners: "vuln"

  # Job 3: Trigger infrastructure deployment
  trigger-deployment:
    name: Trigger Infrastructure Deployment
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Check if infrastructure token exists
        id: check-token
        run: |
          if [ -z "${{ secrets.INFRASTRUCTURE_REPO_TOKEN }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⚠️ INFRASTRUCTURE_REPO_TOKEN not configured - skipping deployment trigger"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Trigger infrastructure deployment workflow
        if: steps.check-token.outputs.skip != 'true'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INFRASTRUCTURE_REPO_TOKEN }}
          repository: Travion-Reserch-Project/infrastructure
          event-type: deploy-ml-service
          client-payload: |
            {
              "service": "ml-service",
              "branch": "${{ github.ref_name }}",
              "sha": "${{ github.sha }}",
              "image": "${{ needs.build-and-push.outputs.transport-service-image }}",
              "ai_agent_engine_image": "${{ needs.build-and-push.outputs.ai-agent-engine-image }}",
              "mcp_google_maps_image": "${{ needs.build-and-push.outputs.mcp-google-maps-image }}",
              "safety_service_image": "${{ needs.build-and-push.outputs.safety-service-image }}",
              "transport_service_image": "${{ needs.build-and-push.outputs.transport-service-image }}",
              "weather_service_image": "${{ needs.build-and-push.outputs.weather-service-image }}",
              "images": {
                "ai_agent_engine": "${{ needs.build-and-push.outputs.ai-agent-engine-image }}",
                "mcp_google_maps": "${{ needs.build-and-push.outputs.mcp-google-maps-image }}",
                "safety_service": "${{ needs.build-and-push.outputs.safety-service-image }}",
                "transport_service": "${{ needs.build-and-push.outputs.transport-service-image }}",
                "weather_service": "${{ needs.build-and-push.outputs.weather-service-image }}"
              },
              "triggered_by": "${{ github.actor }}",
              "mongodb": {
                "uri": "${{ secrets.MONGODB_URI }}",
                "db_name": "${{ env.MONGODB_DB_NAME }}"
              },
              "dagshub": {
                "token": "${{ secrets.DAGSHUB_TOKEN }}",
                "repo_owner": "${{ env.DAGSHUB_REPO_OWNER }}",
                "repo_name": "${{ env.DAGSHUB_REPO_NAME }}"
              },
              "infisical": {
                "client_id": "${{ secrets.INFISICAL_CLIENT_ID }}",
                "client_secret": "${{ secrets.INFISICAL_CLIENT_SECRET }}",
                "project_id": "${{ secrets.INFISICAL_PROJECT_ID }}",
                "environment": "${{ secrets.INFISICAL_ENVIRONMENT || 'prod' }}"
              }
            }

      - name: Deployment triggered
        if: steps.check-token.outputs.skip != 'true'
        run: |
          echo "✅ Infrastructure deployment triggered"
          echo "🔗 Check: https://github.com/Travion-Reserch-Project/infrastructure/actions"
          echo "📦 Service: ml-service"
          echo "🌿 Branch: ${{ github.ref_name }}"
