version: "3.8"

services:
  # Transport Safety Risk Prediction Service
  transport-service:
    build: ./transport-service
    container_name: transport-service
    ports:
      - "8001:8001"
    volumes:
      - ./transport-service:/app
    env_file:
      - .env
      - ./transport-service/.env
    environment:
      - PYTHONUNBUFFERED=1
      - SERVICE_NAME=transport-service
    restart: unless-stopped
    networks:
      - ml-services-network

  # Virtual Tour Guide Service

  # Google Maps MCP Server (Places API adapter for restaurant/hotel search)
  mcp-google-maps:
    build: ./mcp-google-maps
    container_name: mcp-google-maps
    ports:
      - "8010:8010"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    networks:
      - ml-services-network

  # Risk Prediction Service

  # Smart UV Assistance Service

networks:
  ml-services-network:
    driver: bridge

volumes:
  transport-data:
