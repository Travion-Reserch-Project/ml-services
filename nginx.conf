# Nginx Configuration for Travion ML Services
# Reverse proxy, load balancing, and routing for all microservices

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Performance tuning
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/atom+xml image/svg+xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=10r/s;

    # Upstream definitions for load balancing
    upstream transport_service {
        server transport-service:8001 max_fails=3 fail_timeout=30s;
    }

    upstream safety_service {
        server safety-service:8003 max_fails=3 fail_timeout=30s;
    }

    upstream weather_service {
        server weather-service:8002 max_fails=3 fail_timeout=30s;
    }

    upstream ai_agent_engine {
        server ai-agent-engine:8004 max_fails=3 fail_timeout=30s;
    }

    # HTTP server - redirect to HTTPS
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # Allow ACME challenges for Let's Encrypt
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # Redirect all other traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server
    server {
        listen 443 ssl http2 default_server;
        listen [::]:443 ssl http2 default_server;
        server_name _;

        # SSL configuration (paths configured in docker-compose)
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # Cache configuration
        proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=api_cache:10m max_size=1g inactive=60m;

        # =====================================================================
        # TRANSPORT SERVICE ROUTES
        # =====================================================================
        location /api/transport/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://transport_service;
            proxy_http_version 1.1;
            
            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Connection "";
            
            # Buffering
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_redirect off;
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Caching
            proxy_cache api_cache;
            proxy_cache_valid 200 5m;
            proxy_cache_methods GET HEAD;
            proxy_cache_key "$scheme$request_method$host$request_uri";
            
            # Cache bypass for specific endpoints
            proxy_cache_bypass $http_cache_control;
            add_header X-Cache-Status $upstream_cache_status;
        }

        # Transport health check
        location /api/transport/health {
            access_log off;
            proxy_pass http://transport_service;
            proxy_set_header Host $host;
        }

        # =====================================================================
        # SAFETY SERVICE ROUTES
        # =====================================================================
        location /api/safety/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://safety_service;
            proxy_http_version 1.1;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            
            proxy_buffering off;
            proxy_redirect off;
            
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;

            # Cache safety predictions (they don't change often)
            proxy_cache api_cache;
            proxy_cache_valid 200 10m;
            proxy_cache_methods GET HEAD;
            add_header X-Cache-Status $upstream_cache_status;
        }

        # Safety health check
        location /api/safety/health {
            access_log off;
            proxy_pass http://safety_service;
            proxy_set_header Host $host;
        }

        # =====================================================================
        # WEATHER SERVICE ROUTES
        # =====================================================================
        location /api/weather/ {
            limit_req zone=upload_limit burst=5 nodelay;

            proxy_pass http://weather_service;
            proxy_http_version 1.1;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            
            proxy_buffering off;
            proxy_redirect off;
            
            # Longer timeout for image processing
            proxy_connect_timeout 30s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;

            # No caching for image analysis (changes per input)
            proxy_cache off;
        }

        # Weather health check
        location /api/weather/health {
            access_log off;
            proxy_pass http://weather_service;
            proxy_set_header Host $host;
        }

        # =====================================================================
        # AI AGENT ENGINE ROUTES
        # =====================================================================
        location /api/agent/ {
            limit_req zone=api_limit burst=10 nodelay;

            proxy_pass http://ai_agent_engine;
            proxy_http_version 1.1;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_redirect off;
            
            # Streaming support for agent responses
            proxy_set_header Transfer-Encoding chunked;
            chunked_transfer_encoding on;
            
            # Longer timeouts for LLM responses
            proxy_connect_timeout 30s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;

            # No caching for agent responses
            proxy_cache off;
        }

        # v1 API routes for AI Agent
        location /api/v1/ {
            limit_req zone=api_limit burst=10 nodelay;

            proxy_pass http://ai_agent_engine;
            proxy_http_version 1.1;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            
            proxy_buffering off;
            proxy_redirect off;
            
            # Streaming
            proxy_set_header Transfer-Encoding chunked;
            chunked_transfer_encoding on;
            
            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;

            proxy_cache off;
        }

        # Agent health check
        location /api/v1/health {
            access_log off;
            proxy_pass http://ai_agent_engine;
            proxy_set_header Host $host;
        }

        # =====================================================================
        # STATIC & UTILITY ROUTES
        # =====================================================================

        # Root health check
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # API documentation aggregator (optional)
        location /docs {
            alias /usr/share/nginx/html/docs;
            index index.html;
        }

        # Metrics endpoint (optional - for monitoring)
        location /metrics {
            return 404;  # Restrict access if not needed
        }

        # Status page
        location /status {
            return 200 '{"status": "healthy", "timestamp": "$date_gmt"}';
            add_header Content-Type application/json;
            access_log off;
        }

        # Catch-all for unmatched routes
        location / {
            return 404;
        }
    }
}
